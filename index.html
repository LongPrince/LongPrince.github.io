<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mở Thư</title>
    <!-- Nhúng CSS phong cách cổ điển -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Lớp phủ chuyển trang mượt mà -->
    <div class="transition-overlay" id="overlay"></div>

    <div class="main-container">
        <!-- Dấu mộc bưu điện -->
        <img src="asset/postage mark_vector.png" alt="Postage Stamp" class="postage-stamp">

        <!-- Container Phong bì -->
        <div class="envelope-container" id="envelope">
            <!-- Ảnh phong bì đóng/mở -->
            <img src="asset/letter_close.png" alt="Envelope" class="envelope-img" id="envelope-img">
            
            <!-- Vệt màu nền cọ quét -->
            <div class="brush-stroke"></div>

            <!-- Cành hoa khô đè lên -->
            <img src="asset/hoa.png" alt="Dried Flower Decor" class="flower-on-envelope" id="flower-decor">

            <!-- Băng keo dán trang trí -->
            <div class="washi-tape-green"></div>
            <div class="washi-tape-beige"></div>
        </div>

        <!-- Dòng chữ gợi ý mở thư -->
        <div class="action-text" id="action-text">Nhấn vào để mở thư</div>
    </div>

    <!-- Nhạc nền phát khi click mở thư -->
    <audio id="bg-audio" loop>
        <source src="asset/intro.mp3" type="audio/mp3">
    </audio>

    <script>
        const envelope = document.getElementById('envelope');
        const envelopeImg = document.getElementById('envelope-img');
        const actionText = document.getElementById('action-text');
        const audio = document.getElementById('bg-audio');
        const overlay = document.getElementById('overlay');

        let isOpened = false;

        function openLetter() {
            if (isOpened) return;
            isOpened = true;

            // Thêm hiệu ứng click nhẹ
            envelope.classList.add('opening');

            setTimeout(() => {
                envelope.classList.remove('opening');
                envelope.classList.add('open');
                
                // Thay đổi hình ảnh sang phong bì mở
                envelopeImg.src = 'asset/letter_open.png';
                actionText.textContent = 'Đang mở thư...';

                // Phát nhạc nền (vì người dùng đã click nên trình duyệt sẽ cho phép phát nhạc)
                audio.play().then(() => {
                    // Lưu trạng thái âm thanh để trang tiếp theo biết âm thanh đang phát
                    localStorage.setItem('audioPlaying', 'true');
                    localStorage.setItem('audioCurrentTime', audio.currentTime.toString());
                }).catch(err => {
                    console.log("Audio play failed/blocked:", err);
                });

                // Chờ hiệu ứng chuyển động hoàn tất rồi kích hoạt chuyển trang
                setTimeout(() => {
                    // Kích hoạt overlay chuyển trang mượt mà
                    overlay.classList.add('active');
                    
                    // Chuyển hướng sang trang loading
                    setTimeout(() => {
                        window.location.href = 'loading.html';
                    }, 800); // Đợi overlay mờ dần
                }, 1200);

            }, 150);
        }

        // Đăng ký sự kiện click cho cả phong bì và dòng chữ
        envelope.addEventListener('click', openLetter);
        actionText.addEventListener('click', openLetter);
    </script>
</body>
</html>
