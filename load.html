<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang tải...</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#000;
            color:#fff;
            font-family:Arial, Helvetica, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            overflow:hidden;
        }

        #start-btn{
            padding:15px 35px;
            font-size:20px;
            font-weight:bold;
            border:none;
            border-radius:40px;
            background:#ff0055;
            color:#fff;
            cursor:pointer;
            box-shadow:0 0 20px rgba(255,0,85,.6);
            transition:.3s;
        }

        #start-btn:hover{
            transform:scale(1.08);
            box-shadow:0 0 30px rgba(255,0,85,.9);
        }

        #loading-content{
            display:none;
            text-align:center;
        }

        p{
            font-size:22px;
            margin-bottom:20px;
            font-weight:bold;
        }

        /* Loading Spinner */
        .spinner{
            width:70px;
            height:70px;
            margin:20px auto 30px;
            border:7px solid rgba(255,255,255,.15);
            border-top:7px solid #ff0055;
            border-right:7px solid #00e5ff;
            border-radius:50%;
            animation:spin .8s linear infinite;
            box-shadow:0 0 20px rgba(255,0,85,.6);
        }

        @keyframes spin{
            from{
                transform:rotate(0deg);
            }
            to{
                transform:rotate(360deg);
            }
        }

        video{
            height:300px;
            border-radius:15px;
            box-shadow:0 0 25px rgba(255,255,255,.15);
        }
    </style>
</head>

<body>

<button id="start-btn">
    BẤM VÀO ĐỂ VÀO TRANG
</button>

<div id="loading-content">

    <p>Đang tải, vui lòng đợi...</p>

    <!-- Icon loading -->
    <div class="spinner"></div>

    <video autoplay loop muted>
        <source src="asset/khabanh_loading.mp4" type="video/mp4">
    </video>

    <audio id="bg-audio" loop>
        <source src="asset/intro.mp3" type="audio/mp3">
    </audio>

</div>

<script>

const startBtn = document.getElementById("start-btn");
const loadingContent = document.getElementById("loading-content");
const audio = document.getElementById("bg-audio");

startBtn.addEventListener("click",()=>{

    // Ẩn nút
    startBtn.style.display="none";

    // Hiện loading
    loadingContent.style.display="block";

    // Phát nhạc
    audio.play().catch(err=>{
        console.log(err);
    });

    // Chuyển trang sau 6 giây
    setTimeout(()=>{
        window.location.href="index.html";
    },6000);

});

</script>

</body>
</html>
